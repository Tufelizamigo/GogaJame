  {

    address: "78 Airport Boulevard, Jewel Changi Airport",

  },
  {

    rating: 5.0, desc: "Take one silly photo at every place we visit, then make a little instagram story at the end.",
    address: "Every location we go",
    hours: "Anytime",
    price: "Free",
    tip: "Be super silly.",
    maps: ""
  }
];

const list = document.getElementById('list');
const state = {};

// ---- Storage layer: Firebase (shared) with localStorage fallback ----
const STORAGE_KEY = 'siblingAdventureProgress';
let saved = {};
try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch (e) { saved = {}; }

let db = null;          // Firebase database ref (null until set up)
let progressRef = null;
let firebaseReady = false;

// Only start Firebase if a real config was pasted in
if (typeof firebaseConfig !== 'undefined' && firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf('PASTE') === -1) {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    progressRef = db.ref('sharedProgress');
    firebaseReady = true;
  } catch (e) {
    console.warn('Firebase init failed, using offline mode:', e);
  }
}

function saveState() {
  // Always keep a local copy as backup
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
  // Push to the shared cloud list if connected
  if (firebaseReady && progressRef) {
    progressRef.set(state).catch(err => console.warn('Cloud save failed:', err));
  }
}

function stars(r) {
  const full = Math.round(r);
  return "★".repeat(full) + "☆".repeat(5 - full);
}

activities.forEach((a, i) => {
  state[i] = !!saved[i];
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-head">
      <div class="check ${state[i] ? 'done' : ''}" data-check="${i}">${state[i] ? '✓' : ''}</div>
      <div class="icon">${a.icon}</div>
      <div class="title-area" data-toggle="${i}">
        <div class="name ${state[i] ? 'done' : ''}" id="name-${i}">${a.name}</div>
        <div class="tag">${a.tag}</div>
      </div>
      <div class="arrow" id="arrow-${i}" data-toggle="${i}">▼</div>
    </div>
    <div class="details" id="details-${i}">
      <div class="details-inner">
        <div class="desc">${a.desc}</div>
        <div class="detail-row"><span class="detail-label">Rating</span><span class="detail-val"><span class="stars">${stars(a.rating)}</span> ${a.rating}</span></div>
        <div class="detail-row"><span class="detail-label">Address</span><span class="detail-val">${a.address}</span></div>
        <div class="detail-row"><span class="detail-label">Hours</span><span class="detail-val">${a.hours}</span></div>
        <div class="detail-row"><span class="detail-label">Price</span><span class="detail-val">${a.price}</span></div>
        <div class="detail-row"><span class="detail-label">💡 Tip</span><span class="detail-val">${a.tip}</span></div>
        ${a.maps ? `<a class="go-btn" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(a.maps)}" target="_blank" rel="noopener">📍 Go Now</a>` : ''}
      </div>
    </div>
  `;
  list.appendChild(card);
});

document.getElementById('ptext').textContent = '0 of ' + activities.length + ' done';
updateProgress();

// Apply a state object to the on-screen boxes (used for live cloud updates)
function applyState(newState) {
  activities.forEach((a, i) => {
    const on = !!(newState && newState[i]);
    state[i] = on;
    const box = document.querySelector('[data-check="' + i + '"]');
    const name = document.getElementById('name-' + i);
    if (box) { box.classList.toggle('done', on); box.textContent = on ? '✓' : ''; }
    if (name) { name.classList.toggle('done', on); }
  });
  updateProgress();
}

// Listen for live changes from the shared cloud list (your sister's taps show up here)
if (firebaseReady && progressRef) {
  progressRef.on('value', (snap) => {
    const cloud = snap.val();
    if (cloud) { applyState(cloud); }
  });
}

function toggleDetails(i) {
  const d = document.getElementById('details-' + i);
  const arrow = document.getElementById('arrow-' + i);
  if (d.style.maxHeight && d.style.maxHeight !== '0px') {
    d.style.maxHeight = '0px';
    arrow.classList.remove('open');
  } else {
    d.style.maxHeight = d.scrollHeight + 'px';
    arrow.classList.add('open');
  }
}

function toggleCheck(i) {
  state[i] = !state[i];
  const box = document.querySelector('[data-check="' + i + '"]');
  const name = document.getElementById('name-' + i);
  box.classList.toggle('done', state[i]);
  box.textContent = state[i] ? '✓' : '';
  name.classList.toggle('done', state[i]);
  saveState();
  updateProgress();
}

function updateProgress() {
  const done = Object.values(state).filter(Boolean).length;
  const total = activities.length;
  const pct = Math.round(done / total * 100);
  document.getElementById('fill').style.width = pct + '%';
  document.getElementById('ptext').textContent = done + ' of ' + total + ' done';
  document.getElementById('celebrate').style.display = (done === total) ? 'block' : 'none';
}

document.addEventListener('click', (e) => {
  const checkEl = e.target.closest('[data-check]');
  const toggleEl = e.target.closest('[data-toggle]');
  if (checkEl) { toggleCheck(checkEl.dataset.check); return; }
  if (toggleEl) { toggleDetails(toggleEl.dataset.toggle); }
});
</script>
